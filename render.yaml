services:
  - type: web
    name: identificador-api
    env: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SERPAPI_API_KEY
        sync: false
      - key: SERPAPI_ENDPOINT
        value: https://serpapi.com/search.json
      - key: SERPAPI_ENGINE
        value: google_lens
      - key: SEARCH_TTL_SECONDS
        value: 900
      - key: ENVIRONMENT
        value: production

